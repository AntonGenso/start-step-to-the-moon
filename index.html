<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Step to the Moon — Intro</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: system-ui, -apple-system, sans-serif;
  }
  .stage {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, #0a0e1f 0%, #02040a 60%, #000 100%);
    overflow: hidden;
  }
  canvas#stars {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  .logo {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.05);
    opacity: 0;
    will-change: transform, opacity, filter;
    filter: blur(20px);
  }
  .logo img {
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }
  #logo-21 img {
    height: 180px;
    width: auto;
  }
  #logo-uz img {
    height: 140px;
    width: auto;
  }
  #scene-a4 {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    opacity: 0;
    transform: scale(1.04);
    will-change: opacity, transform;
  }
  #scene-a4 video,
  #scene-a4 #fallback-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    user-select: none;
    -webkit-user-drag: none;
    display: block;
  }
  #video-wrap {
    position: relative;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }
  /* top bar — only on mobile, fills the black zone above the video */
  #top-bar {
    display: none;
    padding: 32px 32px 20px;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 700ms ease-out;
    pointer-events: none;
  }
  #top-bar.show { opacity: 1; }
  #top-bar .top-logo {
    height: 70px;
    width: auto;
    display: block;
  }
  #top-bar .logo-uz {
    height: 56px;
  }
  /* start button area */
  #start-area {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    padding: 20px 24px 36px;
    pointer-events: none;
  }
  #start-btn {
    opacity: 0;
    transform: translateY(24px);
    background: #FF6B35;
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 18px 56px;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 3px;
    font-family: system-ui, -apple-system, sans-serif;
    cursor: pointer;
    pointer-events: none;
    box-shadow: 0 8px 28px rgba(255, 107, 53, 0.4), 0 0 0 0 rgba(255, 107, 53, 0.5);
    transition: opacity 700ms ease-out, transform 700ms cubic-bezier(0.16, 1, 0.3, 1),
                background 0.2s, box-shadow 0.3s;
  }
  #start-btn.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
    animation: pulse 2.4s ease-in-out 1.4s infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 8px 28px rgba(255, 107, 53, 0.4), 0 0 0 0 rgba(255, 107, 53, 0.5); }
    50% { box-shadow: 0 8px 28px rgba(255, 107, 53, 0.5), 0 0 0 16px rgba(255, 107, 53, 0); }
  }
  #start-btn:hover {
    background: #FF8052;
  }
  #start-btn:active {
    transform: translateY(2px) scale(0.98);
  }
  /* video element switching */
  #video-desktop { display: block; }
  #video-mobile { display: none; }
  #fallback-img { display: none; }

  /* MOBILE / PORTRAIT — show top bar with logos, button under video */
  @media (max-width: 768px), (orientation: portrait) {
    #video-desktop { display: none; }
    #video-mobile { display: block; }
    #top-bar { display: flex; }
    #scene-a4 video,
    #scene-a4 #fallback-img {
      object-fit: contain;
    }
  }

  /* DESKTOP / LANDSCAPE — video fills everything, button overlays at bottom-center */
  @media (min-width: 769px) and (orientation: landscape) {
    #start-area {
      position: absolute;
      bottom: 40px;
      left: 0;
      right: 0;
      padding: 0;
    }
  }
  .skip {
    position: absolute;
    top: 24px;
    right: 24px;
    z-index: 100;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.7);
    padding: 8px 18px;
    border-radius: 22px;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .skip:hover {
    background: rgba(255,255,255,0.12);
    color: #fff;
  }
</style>
</head>
<body>

<div class="stage">
  <canvas id="stars"></canvas>

  <div class="logo" id="logo-21">
    <img src="White_4x.png" alt="School 21">
  </div>

  <div class="logo" id="logo-uz">
    <img src="uzcosmos_logo_white.png" alt="UZCOSMOS">
  </div>

  <div id="scene-a4">
    <div id="top-bar">
      <img src="White_4x.png" alt="School 21" class="top-logo">
      <img src="uzcosmos_logo_white.png" alt="UZCOSMOS" class="top-logo logo-uz">
    </div>
    <div id="video-wrap">
      <video id="video-desktop" autoplay muted loop playsinline webkit-playsinline preload="auto" poster="A4.png">
        <source src="https://cdn.jsdelivr.net/gh/AntonGenso/start-step-to-the-moon@main/video-desktop.mp4" type="video/mp4">
      </video>
      <video id="video-mobile" autoplay muted loop playsinline webkit-playsinline preload="auto" poster="A4.png">
        <source src="https://cdn.jsdelivr.net/gh/AntonGenso/start-step-to-the-moon@main/video-mobile.mp4" type="video/mp4">
      </video>
      <img id="fallback-img" src="A4.png" alt="Step to the Moon">
    </div>
    <div id="start-area">
      <button id="start-btn" type="button">START</button>
    </div>
  </div>

  <button class="skip" id="skip">SKIP →</button>
</div>

<script>
// ============ STARFIELD ============
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth * window.devicePixelRatio;
  canvas.height = window.innerHeight * window.devicePixelRatio;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
}
resize();
window.addEventListener('resize', resize);

const stars = [];
const STAR_COUNT = 400;

function initStars() {
  stars.length = 0;
  for (let i = 0; i < STAR_COUNT; i++) {
    stars.push({
      x: (Math.random() - 0.5) * canvas.width * 2,
      y: (Math.random() - 0.5) * canvas.height * 2,
      z: Math.random() * canvas.width,
      pz: 0,
      size: Math.random() * 1.5 + 0.3
    });
  }
}
initStars();

// speed: starts high (warp from deep space), slows to gentle drift
let warpSpeed = 25;

function drawStars() {
  ctx.fillStyle = 'rgba(2, 4, 10, 0.35)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  for (const s of stars) {
    s.pz = s.z;
    s.z -= warpSpeed;

    if (s.z < 1) {
      s.x = (Math.random() - 0.5) * canvas.width * 2;
      s.y = (Math.random() - 0.5) * canvas.height * 2;
      s.z = canvas.width;
      s.pz = s.z;
    }

    const sx = (s.x / s.z) * cx + cx;
    const sy = (s.y / s.z) * cy + cy;
    const psx = (s.x / s.pz) * cx + cx;
    const psy = (s.y / s.pz) * cy + cy;

    const r = (1 - s.z / canvas.width) * s.size * window.devicePixelRatio * 1.8;
    const alpha = Math.min(1, (1 - s.z / canvas.width) * 1.2);

    // streak (gives warp effect)
    if (warpSpeed > 3) {
      ctx.strokeStyle = `rgba(255, 255, 255, ${alpha * 0.7})`;
      ctx.lineWidth = r * 0.6;
      ctx.beginPath();
      ctx.moveTo(psx, psy);
      ctx.lineTo(sx, sy);
      ctx.stroke();
    }

    // star
    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.fill();
  }

  requestAnimationFrame(drawStars);
}
drawStars();

// ============ LOGO ANIMATION ============
const logo21 = document.getElementById('logo-21');
const logoUz = document.getElementById('logo-uz');
const sceneA4 = document.getElementById('scene-a4');

// CSS transitions for the entire animation
const APPEAR_EASE = 'cubic-bezier(0.16, 1, 0.3, 1)'; // smooth ease-out
const EXIT_EASE = 'cubic-bezier(0.7, 0, 0.84, 0)';   // accelerating

function showLogo21() {
  // appears from deep space: tiny + blurred → full size + sharp
  logo21.style.transition = `transform 1800ms ${APPEAR_EASE}, opacity 1400ms ease-out, filter 1400ms ease-out`;
  logo21.style.transform = 'translate(-50%, -50%) scale(1)';
  logo21.style.opacity = '1';
  logo21.style.filter = 'blur(0px)';
}

function hideLogo21() {
  // flies forward (zoom past camera) + fades
  logo21.style.transition = `transform 900ms ${EXIT_EASE}, opacity 700ms ease-in, filter 700ms ease-in`;
  logo21.style.transform = 'translate(-50%, -50%) scale(3.5)';
  logo21.style.opacity = '0';
  logo21.style.filter = 'blur(8px)';
}

function showLogoUz() {
  logoUz.style.transition = `transform 1800ms ${APPEAR_EASE}, opacity 1400ms ease-out, filter 1400ms ease-out`;
  logoUz.style.transform = 'translate(-50%, -50%) scale(1)';
  logoUz.style.opacity = '1';
  logoUz.style.filter = 'blur(0px)';
}

function hideLogoUz() {
  logoUz.style.transition = `transform 900ms ${EXIT_EASE}, opacity 700ms ease-in, filter 700ms ease-in`;
  logoUz.style.transform = 'translate(-50%, -50%) scale(3.5)';
  logoUz.style.opacity = '0';
  logoUz.style.filter = 'blur(8px)';
}

function showSceneA4() {
  // hide SKIP button — no longer needed once we're at the final scene
  const skipBtn = document.getElementById('skip');
  skipBtn.style.transition = 'opacity 500ms ease-out';
  skipBtn.style.opacity = '0';
  skipBtn.style.pointerEvents = 'none';
  // hard-hide after fade so it's gone for sure (CSS hover etc. can't bring it back)
  setTimeout(() => {
    skipBtn.style.visibility = 'hidden';
    skipBtn.style.display = 'none';
  }, 550);

  // smooth fade-in with subtle zoom-out — feels like the camera settles on the artwork
  sceneA4.style.transition = `opacity 1800ms ease-out, transform 2400ms cubic-bezier(0.16, 1, 0.3, 1)`;
  sceneA4.style.opacity = '1';
  sceneA4.style.transform = 'scale(1)';

  // top bar (mobile only — hidden via CSS on desktop) appears with the video
  setTimeout(() => {
    document.getElementById('top-bar').classList.add('show');
  }, 600);

  // START button appears a bit later, after the scene has settled
  setTimeout(() => {
    document.getElementById('start-btn').classList.add('show');
  }, 1400);
}

function tween(from, to, duration, onUpdate) {
  const start = performance.now();
  return new Promise(resolve => {
    function step(now) {
      const t = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - t, 3);
      onUpdate(from + (to - from) * eased);
      if (t < 1) requestAnimationFrame(step);
      else resolve();
    }
    requestAnimationFrame(step);
  });
}

function wait(ms) {
  return new Promise(r => setTimeout(r, ms));
}

let cancelled = false;

async function runIntro() {
  // 0.0 — 0.2s: pause at warp speed (build anticipation)
  await wait(200);
  if (cancelled) return;

  // 0.2 — 2.0s: logo 21 emerges from deep space (stars keep flying at full warp)
  showLogo21();
  await wait(1800);
  if (cancelled) return;

  // 2.0 — 2.8s: hold logo 21 in focus
  await wait(800);
  if (cancelled) return;

  // 2.8 — 3.7s: logo 21 flies past camera (stars stay at warp)
  hideLogo21();
  await wait(500);
  if (cancelled) return;

  // 3.3 — 5.1s: UZCOSMOS emerges (stars still at warp)
  showLogoUz();
  await wait(1800);
  if (cancelled) return;

  // 5.1 — 5.9s: hold UZCOSMOS
  await wait(800);
  if (cancelled) return;

  // 5.9 — 7.1s: UZCOSMOS softly fades out (no aggressive zoom-past — we want a calm transition)
  logoUz.style.transition = `opacity 1200ms ease-in-out, filter 1200ms ease-in-out, transform 1200ms ease-in-out`;
  logoUz.style.opacity = '0';
  logoUz.style.filter = 'blur(12px)';
  logoUz.style.transform = 'translate(-50%, -50%) scale(1.15)';

  // calm the starfield down — the scene is about to settle on the video
  tween(25, 0.8, 1400, v => warpSpeed = v);
  await wait(900);
  if (cancelled) return;

  // 6.8s onward: A4 image fades in smoothly (overlaps slightly with UZCOSMOS fade for seamless feel)
  showSceneA4();
  await wait(2000);
  if (cancelled) return;

  // gentle drift continues underneath the artwork
  tween(warpSpeed, 0.4, 1500, v => warpSpeed = v);
}

// SKIP button — jump straight to the A4 artwork
document.getElementById('skip').addEventListener('click', () => {
  cancelled = true;
  logo21.style.transition = 'opacity 200ms ease-out';
  logoUz.style.transition = 'opacity 200ms ease-out';
  logo21.style.opacity = '0';
  logoUz.style.opacity = '0';
  tween(warpSpeed, 0.4, 600, v => warpSpeed = v);
  setTimeout(() => {
    showSceneA4();
  }, 250);
  window.dispatchEvent(new CustomEvent('intro:skipped'));
});

// ============ VIDEO FALLBACK ============
// Fallback to A4.png ONLY if the active video errors out (file missing, codec issue).
// No timeout — large videos on slow connections must be allowed to load fully.
function setupVideoFallback() {
  const vDesktop = document.getElementById('video-desktop');
  const vMobile = document.getElementById('video-mobile');
  const fallback = document.getElementById('fallback-img');

  // Detect which video is the visible one for this device
  const isMobile = window.matchMedia('(max-width: 768px), (orientation: portrait)').matches;
  const activeVideo = isMobile ? vMobile : vDesktop;
  const inactiveVideo = isMobile ? vDesktop : vMobile;

  // Stop the inactive video from loading at all — saves bandwidth and avoids race conditions
  inactiveVideo.removeAttribute('autoplay');
  inactiveVideo.pause();
  // Clear its source so the browser doesn't fetch it
  const inactiveSource = inactiveVideo.querySelector('source');
  if (inactiveSource) inactiveSource.removeAttribute('src');
  inactiveVideo.load();

  function activateFallback(reason) {
    console.warn('[intro] Falling back to image. Reason:', reason);
    vDesktop.style.display = 'none';
    vMobile.style.display = 'none';
    fallback.style.display = 'block';
  }

  // Log helpful diagnostics so you can see in DevTools what's happening
  activeVideo.addEventListener('loadeddata', () => console.log('[intro] Video data loaded'));
  activeVideo.addEventListener('canplay', () => console.log('[intro] Video can play'));
  activeVideo.addEventListener('playing', () => console.log('[intro] Video is playing'));

  // Fallback only fires on a real error (file missing, bad codec, network failure)
  activeVideo.addEventListener('error', () => activateFallback('video element error'));
  const activeSource = activeVideo.querySelector('source');
  if (activeSource) {
    activeSource.addEventListener('error', () => activateFallback('source error — file not found?'));
  }

  // Some browsers block autoplay even with muted — try programmatic play as a safety net
  activeVideo.play().catch(err => {
    console.warn('[intro] Autoplay was blocked:', err);
    // Don't fall back here — the poster image will show until user interacts
  });
}
setupVideoFallback();

// ============ START BUTTON ============
document.getElementById('start-btn').addEventListener('click', () => {
  // emit an event the parent page / site can listen for
  window.dispatchEvent(new CustomEvent('intro:start'));
  // for testing — uncomment to see it works:
  // alert('START pressed — redirect to registration here');
});

// start when logo images are loaded (videos load in background, scene fades in regardless)
const logoImages = document.querySelectorAll('.logo img');
let loadedCount = 0;
const totalImages = logoImages.length;
logoImages.forEach(img => {
  if (img.complete) {
    loadedCount++;
    if (loadedCount === totalImages) runIntro();
  } else {
    img.addEventListener('load', () => {
      loadedCount++;
      if (loadedCount === totalImages) runIntro();
    });
    img.addEventListener('error', () => {
      loadedCount++;
      if (loadedCount === totalImages) runIntro();
    });
  }
});

// fire completion event after the full sequence (~9s — when scene has fully appeared)
setTimeout(() => {
  if (!cancelled) {
    window.dispatchEvent(new CustomEvent('intro:complete'));
  }
}, 9000);
</script>

</body>
</html>
